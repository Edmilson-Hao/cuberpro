<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Mandarim</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mandarim App">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">Total de Cards</span>
                <span id="stat-total" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Pendentes hoje</span>
                <span id="stat-due" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Progresso Total</span>
                <span id="progress-percent" class="stat-value">0%</span>
            </div>
        </div>

        <div class="progress-container" style="width: 100%; background: #334155; height: 6px; border-radius: 3px; margin-bottom: 24px; overflow: hidden;">
            <div id="main-progress-bar" style="width: 0%; height: 100%; background: #10b981; transition: width 0.5s ease;"></div>
        </div>

        <div class="dashboard-grid">
            
            <div class="card-panel" id="card-panel">
                <div class="card-header">
                    <span id="card-level" class="level-badge">Nível 0</span>
                    <span id="study-timer" class="timer-badge">00:00</span>
                </div>
                
                <div class="card-body">
                    <p id="instruction-text" class="instruction">Carregando...</p>
                    <h1 id="main-display" class="hanzi-display">...</h1>
                    <p id="sub-display" class="hint-display"></p>
                </div>

                <div class="card-footer">
                    <div id="input-zone" class="input-area"></div>
                    <p id="feedback-text" class="feedback"></p>
                </div>
            </div>

            <div class="info-panel">
                <h3 style="margin-top: 0; margin-bottom: 16px; color: #f8fafc; font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 8px;">Distribuição por Nível</h3>
                
                <div style="margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #cbd5e1; margin-bottom: 2px;">
                        <span>Nível 0 (Novos / Nunca Estudados)</span>
                        <span id="count-l0">0</span>
                    </div>
                    <div style="width: 100%; background: #0f172a; height: 4px; border-radius: 2px;"><div id=\"bar-l0\" style="width: 0%; height: 100%; background: #64748b; border-radius: 2px; transition: width 0.3s;"></div></div>
                </div>

                <div style="margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #cbd5e1; margin-bottom: 2px;">
                        <span>Nível 1 (Reconhecimento)</span>
                        <span id="count-l1">0</span>
                    </div>
                    <div style="width: 100%; background: #0f172a; height: 4px; border-radius: 2px;"><div id="bar-l1" style="width: 0%; height: 100%; background: #3b82f6; border-radius: 2px; transition: width 0.3s;"></div></div>
                </div>

                <div style="margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #cbd5e1; margin-bottom: 2px;">
                        <span>Nível 2 (Fixação Fonética)</span>
                        <span id="count-l2">0</span>
                    </div>
                    <div style="width: 100%; background: #0f172a; height: 4px; border-radius: 2px;"><div id="bar-l2" style="width: 0%; height: 100%; background: #0284c7; border-radius: 2px; transition: width 0.3s;"></div></div>
                </div>

                <div style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #cbd5e1; margin-bottom: 2px;">
                        <span>Nível 3 (Mandarim Visual)</span>
                        <span id="count-l3">0</span>
                    </div>
                    <div style="width: 100%; background: #0f172a; height: 4px; border-radius: 2px;"><div id="bar-l3" style="width: 0%; height: 100%; background: #10b981; border-radius: 2px; transition: width 0.3s;"></div></div>
                </div>

                <h3 style="margin-bottom: 12px; color: #f8fafc; font-size: 1rem;">Métricas de Retenção</h3>
                <div class="metrics-list" style="font-size: 0.85rem; color: #94a3b8; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div style="background: #1e293b; padding: 10px; border-radius: 6px; border: 1px solid #334155;">
                        <div>Fator Eficácia (EF):</div>
                        <strong id="stat-ef" style="color: #38bdf8; font-size: 1.1rem; display: block; margin-top: 4px;">2.5</strong>
                    </div>
                    <div style="background: #1e293b; padding: 10px; border-radius: 6px; border: 1px solid #334155;">
                        <div>Dias Seguidos:</div>
                        <strong id="stat-streak" style="color: #f59e0b; font-size: 1.1rem; display: block; margin-top: 4px;">0 🔥</strong>
                    </div>
                </div>

                <div style="margin-top: 24px; display: flex; gap: 10px;">
                    <button id="btn-install" style="flex: 1; padding: 10px; background: #0284c7; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: none;">📥 Instalar App</button>
                    <button id="btn-reset" style="flex: 1; padding: 10px; background: #b91c1c; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">🔄 Reset de Fábrica</button>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
